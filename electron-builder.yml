appId: com.simlauncher.app
productName: SimLauncher
directories:
  output: dist
files:
  - out/**/*
  - package.json
  # The renderer libraries are listed under dependencies so `npm audit --omit=dev`
  # still covers them (they ship — Vite bundles them into out/renderer), but the
  # bundled output is all the app loads at runtime, so their node_modules copies
  # are dead weight in the installer. Exclude them (and their renderer-only
  # transitives) from packaging to keep the asar small. electron-store and
  # electron-updater are intentionally NOT excluded — the main process requires
  # them from node_modules at runtime.
  - '!node_modules/react/**/*'
  - '!node_modules/react-dom/**/*'
  - '!node_modules/react-colorful/**/*'
  - '!node_modules/@floating-ui/**/*'
  - '!node_modules/scheduler/**/*'
  - '!node_modules/tabbable/**/*'
extraResources:
  - from: assets/
    to: assets/
  - from: SimLauncher.ico
    to: SimLauncher.ico
win:
  target: nsis
  icon: SimLauncher.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  # Hyphenated, space-free name so the local artifact, the published GitHub
  # asset, latest.yml and SHA256SUMS.txt all agree — otherwise the default
  # "${productName} Setup ${version}" (with spaces) is sanitized to hyphens on
  # upload and `sha256sum -c SHA256SUMS.txt` fails on the downloaded asset (#614).
  artifactName: ${productName}-Setup-${version}.${ext}
publish:
  provider: github
  owner: Stashpeak
  repo: SimLauncher
