appId: com.simlauncher.app
productName: SimLauncher
directories:
  output: dist
files:
  - out/**/*
  - package.json
extraResources:
  - from: assets/
    to: assets/
  - from: SimLauncher.ico
    to: SimLauncher.ico
win:
  target: nsis
  icon: SimLauncher.ico
  # Azure Artifact Signing (formerly Trusted Signing). Auth comes from the
  # AZURE_TENANT_ID / AZURE_CLIENT_ID / AZURE_CLIENT_SECRET env vars set in CI.
  azureSignOptions:
    # MUST exactly match the certificate's CommonName (CN) = the validated
    # organization name, or SmartScreen reports a publisher mismatch.
    publisherName: 'TODO: validated organization CN (from the cert profile)'
    # West Europe region endpoint (matches where the signing account was created).
    endpoint: 'https://weu.codesigning.azure.net/'
    # The Trusted/Artifact Signing account name (NOT the app registration).
    codeSigningAccountName: 'SimLauncher' # TODO: confirm against the signing account
    certificateProfileName: 'TODO: certificate profile name'
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
publish:
  provider: github
  owner: Stashpeak
  repo: SimLauncher
