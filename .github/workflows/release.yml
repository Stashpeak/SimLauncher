name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Verify tag matches package.json version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(node -p "require('./package.json').version")"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} (version ${tag_version}) does not match package.json version ${pkg_version}. Bump package.json before tagging."
            exit 1
          fi
          echo "Tag ${GITHUB_REF_NAME} matches package.json version ${pkg_version}."

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Build app
        run: npm run build

      - name: Build installer and publish release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          # Azure Artifact Signing credentials (service principal). electron-builder
          # reads these automatically for win.azureSignOptions.
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: npx electron-builder --win --publish always

      # Enforce signing on releases without putting forceCodeSigning in
      # electron-builder.yml (which would break unsigned `npm run dist:win`
      # builds from source). This also asserts the signature is TIMESTAMPED —
      # without a timestamp the signature would expire with the short-lived
      # Trusted Signing cert (~3 days). A failure here fails the release.
      - name: Verify the installer is signed and timestamped
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist -Filter *.exe | Select-Object -First 1
          if (-not $exe) { throw 'No installer found in dist/.' }
          $sig = Get-AuthenticodeSignature $exe.FullName
          Write-Host "File:      $($exe.Name)"
          Write-Host "Status:    $($sig.Status)"
          Write-Host "Signer:    $($sig.SignerCertificate.Subject)"
          Write-Host "Timestamp: $($sig.TimeStamperCertificate.Subject)"
          if (-not $sig.SignerCertificate) { throw 'Installer is NOT signed.' }
          if ($sig.SignerCertificate.Subject -notlike '*CN=David Kohout*') { throw "Unexpected signer: $($sig.SignerCertificate.Subject)" }
          if (-not $sig.TimeStamperCertificate) { throw 'Installer is signed but NOT timestamped.' }
          Write-Host 'OK: signed by David Kohout and timestamped.'

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          cd dist
          sha256sum *.exe | tee SHA256SUMS.txt

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        env:
          # Electron is a devDependency but electron-builder embeds its
          # Chromium runtime into the installer, so dev deps must be included
          # or the shipped, security-critical Electron component is omitted.
          SYFT_JAVASCRIPT_INCLUDE_DEV_DEPENDENCIES: 'true'
        with:
          file: package-lock.json
          format: cyclonedx-json
          output-file: dist/sbom.cdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attach checksums and SBOM to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            dist/SHA256SUMS.txt dist/sbom.cdx.json \
            --repo Stashpeak/SimLauncher --clobber

      - name: Generate release notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          gh release edit ${{ github.ref_name }} \
            --repo Stashpeak/SimLauncher \
            --notes "$(gh api repos/Stashpeak/SimLauncher/releases/generate-notes \
              -f tag_name=${{ github.ref_name }} \
              --jq '.body')"
